function renderForgot(){
  document.getElementById("root").innerHTML = `

function authErr(t){ const m=$("#auth-msg"); m.className="msg err"; m.textContent=t; }
function authOk(t){ const m=$("#auth-msg"); m.className="msg ok"; m.textContent=t; }

async function doSignup(){
  const email=$("#f-email").value.trim(), password=$("#f-pass").value;
  if(!email||password.length<8){ authErr("Enter an email and a password of at least 8 characters."); return; }
  $("#f-go").disabled=true;
  const { data, error } = await db.auth.signUp({ email, password, options:{ data:{
    company:$("#f-company").value.trim(), industry:$("#f-industry").value,
    full_name:$("#f-name").value.trim(), title:$("#f-title").value.trim(), phone:$("#f-phone").value.trim()
  }}});
  $("#f-go").disabled=false;
  if(error){ authErr(error.message); return; }
  if(data.session){ await boot(); }            // email confirmation off -> straight in
  else { authOk("Account created. Check your email to confirm, then sign in."); state.authMode="login"; setTimeout(renderAuth,1600); }
}
async function doLogin(){
  const email=$("#f-email").value.trim(), password=$("#f-pass").value;
  if(!email||!password){ authErr("Enter your email and password."); return; }
  $("#f-go").disabled=true;
  const { error } = await db.auth.signInWithPassword({ email, password });
  $("#f-go").disabled=false;
  if(error){ authErr(error.message); return; }
  await boot();
}
async function doForgot(){
  const email=$("#f-email").value.trim();
  if(!email){ authErr("Enter your email."); return; }
  $("#f-go").disabled=true;
  const redirectTo = location.href.split('#')[0];
  const { error } = await db.auth.resetPasswordForEmail(email, { redirectTo });
  $("#f-go").disabled=false;
  if(error){ authErr(error.message); return; }
  authOk("If an account exists for that email, a reset link is on its way. Check your inbox.");
}
async function doReset(){
  const p1=$("#f-pass").value, p2=$("#f-pass2").value;
  if(p1.length<8){ authErr("Password must be at least 8 characters."); return; }
  if(p1!==p2){ authErr("Passwords do not match."); return; }
  $("#f-go").disabled=true;
  const { error } = await db.auth.updateUser({ password:p1 });
  $("#f-go").disabled=false;
  if(error){ authErr(error.message); return; }
  authOk("Password updated. Signing you in…");
  pendingRecovery=false;
  setTimeout(boot, 1200);
}
async function signOut(){ await db.auth.signOut(); state.account=null; renderAuth(); }

/* ===================== DATA LOAD ===================== */
async function loadData(){
  const { data:{ user } } = await db.auth.getUser();
  if(!user) return false;
  const { data: me } = await db.from('users').select('*').eq('id', user.id).maybeSingle();
  if(!me){ return false; }   // trigger may still be settling
  state.owner = { id:me.id, name:me.full_name||"Owner", email:me.email, title:me.title||"Owner", phone:me.phone||"" };
  const { data: acct } = await db.from('accounts').select('*').eq('id', me.account_id).single();
  state.account = { id:acct.id, company:acct.name, industry:acct.industry, plan:acct.plan, status:acct.status, settings:acct.settings||{}, timezone:(acct.settings&&acct.settings.timezone)||'America/Chicago' };
  const { data: asst } = await db.from('assistants').select('*').eq('account_id', acct.id).order('created_at').limit(1).maybeSingle();
  if(asst){
    state.assistantId = asst.id;
    state.assistant = {
      name:asst.assistant_name||DEFAULT_NAME, greetingLabel:asst.greeting_label||"the office",
      voice:asst.voice_id||"warm-female", languages:(asst.languages&&asst.languages.length)?asst.languages:["en"],
      number:asst.twilio_number||"", recordingNotice:!(asst.routing&&asst.routing.recording_notice===false), active:asst.is_active,
      routing:(asst.routing&&typeof asst.routing==='object')?asst.routing:{}
    };
  }
  const { data: types } = await db.from('appointment_types').select('*').eq('account_id', acct.id).order('created_at');
  state.types = (types||[]).map(t=>({ id:t.id, name:t.name, mode:t.mode, dur:t.default_duration_min, before:t.buffer_before_min, after:t.buffer_after_min, travel:t.requires_travel }));
  const { data: rules } = await db.from('availability_rules').select('*').eq('user_id', me.id);
  state.schedule = DAYS.map(()=>({ working:{on:false,start:"08:00",end:"18:00"}, bookable:{on:false,start:"09:00",end:"15:00"} }));
  (rules||[]).forEach(r=>{ const w = r.rule_type==='working'?state.schedule[r.day_of_week].working:state.schedule[r.day_of_week].bookable; w.on=true; w.start=(r.start_time||"08:00").slice(0,5); w.end=(r.end_time||"18:00").slice(0,5); });
  const { data: blocks } = await db.from('calendar_blocks').select('*').eq('user_id', me.id).order('starts_at');
  state.blocks = (blocks||[]).map(b=>({ id:b.id, type:b.block_type, start:(b.starts_at||"").slice(0,10), end:(b.ends_at||"").slice(0,10), reason:b.reason||"" }));
  await loadMessages();
  await loadAppointments();
  await loadCalls();
  await loadContacts();
  await loadGaps();
  await loadConversations();
  return true;
}

function greetingText(){ const a=state.assistant; let s=`Hello, this is <span class="v">${esc(a.name||DEFAULT_NAME)}</span> with ${esc(a.greetingLabel||"the office")}. `; if(a.recordingNotice) s+=`Just so you know, this call may be recorded for quality and training. `; const oq=((a.routing||{}).opening_question||"").trim(); return s+(oq?esc(oq):`How can I help you?`); }
function greetingPlain(){ const a=state.assistant; let s=`Hello, this is ${a.name||DEFAULT_NAME} with ${a.greetingLabel||"the office"}. `; if(a.recordingNotice) s+=`Just so you know, this call may be recorded for quality and training. `; const oq=((a.routing||{}).opening_question||"").trim(); return s+(oq?oq:`How can I help you?`); }
function pickVoice(g){ const all=window.speechSynthesis.getVoices(); const en=all.filter(v=>/^en(-|_|$)/i.test(v.lang)); const pool=en.length?en:all; const f=/(female|samantha|victoria|zira|karen|moira|tessa|susan|fiona|serena|allison|ava|jenny|aria)/i; const m=/(daniel|alex|david|fred|aaron|thomas|oliver|arthur|gordon|guy|ryan)/i; const want=g==="female"?f:m; return pool.find(v=>want.test(v.name))||pool[0]||null; }
function speakGreeting(btn){ if(!('speechSynthesis' in window))return; const lbl=btn.querySelector(".lbl"); if(window.speechSynthesis.speaking){window.speechSynthesis.cancel();return;} const u=new SpeechSynthesisUtterance(greetingPlain()); const v=pickVoice(state.assistant.voice.includes("female")?"female":"male"); if(v)u.voice=v; u.rate=1;u.pitch=1; u.onstart=()=>{btn.classList.add("speaking");lbl.textContent="Stop";}; u.onend=u.onerror=()=>{btn.classList.remove("speaking");lbl.textContent="Play greeting";}; window.speechSynthesis.speak(u); }

  const sync=()=>{
    a.name=$("#a-name").value; a.greetingLabel=$("#a-label").value; a.voice=$("#a-voice").value; a.number=$("#a-num").value;
    a.recordingNotice=$("#a-rec").checked; a.active=$("#a-active").checked;
    $("#say").innerHTML=greetingText();
    const p=$("#prev"); p.classList.toggle("off",!a.active);
    p.querySelector(".live").innerHTML=`<span class="dot"></span>${a.active? esc(a.name||DEFAULT_NAME)+' is live':'Paused'}`;
    const nm=a.name||DEFAULT_NAME;
    const bn=$("#brand-name"); if(bn) bn.textContent=nm;
    const rl=$("#run-label"); if(rl) rl.textContent=`Running ${nm}`;
    document.title=`${nm} — Dashboard`;
    const ld=$("#assist-lede"); if(ld) ld.textContent=`Configure how ${nm} introduces herself and answers. The name you set here flows across your whole dashboard and is what callers hear. On the Enterprise plan each person can have their own.`;
  };
  ["a-name","a-label","a-num"].forEach(id=>$("#"+id).oninput=sync);
  ["a-voice","a-rec","a-active"].forEach(id=>$("#"+id).onchange=sync);
  $("#a-langs").querySelectorAll(".chip").forEach(c=>c.onclick=()=>{ const l=c.dataset.l, on=c.getAttribute("aria-pressed")==="true"; if(on){a.languages=a.languages.filter(x=>x!==l);}else{a.languages.push(l);} c.setAttribute("aria-pressed",String(!on)); });
  $("#a-save").onclick=saveAssistant;
  { const ie=$("#a-instr"); if(ie) ie.oninput=()=>{ state.assistant.routing=state.assistant.routing||{}; state.assistant.routing.custom_instructions=ie.value; }; }
  { const oe=$("#a-openq"); if(oe) oe.oninput=()=>{ state.assistant.routing=state.assistant.routing||{}; state.assistant.routing.opening_question=oe.value; const sy=$("#say"); if(sy) sy.innerHTML=greetingText(); }; }
  async function runProvision(area, replace, btn, msg){
    if(area.length!==3){ msg.style.color="var(--danger)"; msg.textContent="Enter a 3-digit area code."; return; }
    btn.disabled=true; const o=btn.textContent; btn.textContent=replace?"Replacing…":"Getting a number…"; msg.style.color="var(--muted)"; msg.textContent="";
    try{
      const { data, error }=await db.functions.invoke("provision-phone-number",{ body:{ area_code:area, replace } });
      if(error || !data || !data.ok){ msg.style.color="var(--danger)"; msg.textContent=(data&&data.error)||(error&&error.message)||"Could not get a number."; btn.disabled=false; btn.textContent=o; return; }
      a.number=data.phone_number;
      const ni=$("#a-num"); if(ni) ni.value=data.phone_number;
      msg.style.color="var(--ok)"; msg.textContent=(replace?"New number: ":"Connected: ")+(data.phone_number_pretty||data.phone_number);
      setTimeout(()=>pageAssistant(), 1500);
    }catch(e){ msg.style.color="var(--danger)"; msg.textContent="Could not get a number."; btn.disabled=false; btn.textContent=o; }
  }
  const pg=$("#prov-go");
  if(pg) pg.onclick=()=>runProvision(($("#prov-area").value||"").replace(/\D/g,""), false, pg, $("#prov-msg"));
  const ct=$("#change-toggle");
  if(ct) ct.onclick=()=>{ const box=$("#change-box"); if(box) box.style.display="block"; ct.style.display="none"; };
  const cg=$("#chg-go");
  if(cg) cg.onclick=()=>{
    const area=($("#chg-area").value||"").replace(/\D/g,"");
    if(!confirm("This releases your current number ("+a.number+"). Anyone who calls it will no longer reach you. Continue?")) return;
    runProvision(area, true, cg, $("#chg-msg"));
  };
  const pb=$("#play-btn");
  if(!('speechSynthesis' in window)){ pb.disabled=true; pb.querySelector(".lbl").textContent="Audio not supported"; }
  else pb.onclick=()=>{ sync(); speakGreeting(pb); };
}
async function saveAssistant(){
  const a=state.assistant, btn=$("#a-save"); btn.disabled=true; const o=btn.textContent; btn.textContent="Saving…";
  const instrEl=$("#a-instr"); const custom_instructions=instrEl?instrEl.value.trim():(((a.routing||{}).custom_instructions)||"");
  const oqEl=$("#a-openq"); const opening_question=oqEl?oqEl.value.trim():(((a.routing||{}).opening_question)||"");
  const routing=Object.assign({}, a.routing||{}, {recording_notice:a.recordingNotice, custom_instructions, opening_question});
  const row={ assistant_name:a.name, greeting_label:a.greetingLabel, voice_id:a.voice, languages:a.languages, twilio_number:a.number||null, is_active:a.active, routing };
  let error;
  if(state.assistantId){ ({error}=await db.from('assistants').update(row).eq('id',state.assistantId)); }
  else { row.account_id=state.account.id; const r=await db.from('assistants').insert(row).select().single(); error=r.error; if(r.data) state.assistantId=r.data.id; }
  if(!error) a.routing=routing;
  btn.disabled=false; btn.textContent=error?"Error — retry":"Saved ✓"; setTimeout(()=>btn.textContent=o,1300);
}

async function addBlock(){

async function removeBlock(id,idx){

async function loadMessages(){
  const { data } = await db.from('messages').select('*').eq('account_id', state.account.id).order('created_at',{ascending:false}).limit(200);
  state.messages = (data||[]).map(m=>({ id:m.id, body:m.body||"", type:m.type, status:m.status, at:m.created_at, language:m.language||null }));
}
function unreadCount(){ return state.messages.filter(m=>m.status==='new').length; }
function parseMsg(body){
  const m = /^Message from (.+?)(?: \(callback: (.+?)\))?: ([\s\S]*)$/.exec(body||"");
  if(m) return { name:m[1], number:m[2]||"", text:m[3] };
  return { name:"", number:"", text:body||"" };
}
function fmtWhen(iso){
  const d=new Date(iso), now=new Date();
  const t=d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
  return d.toDateString()===now.toDateString() ? `Today ${t}` : d.toLocaleDateString(undefined,{month:'short',day:'numeric'})+` · ${t}`;
}
function pageMessages(){
  const open = state.messages.filter(m=>m.status!=='resolved');
  const done = state.messages.filter(m=>m.status==='resolved');
  const render = list => list.map(msgHTML).join("");
  $("#page").innerHTML=`
  <div class="page">
    <div class="page-head"><h1>Messages</h1><p>Calls ${esc(aName())} couldn't fully handle, saved here with a callback number. New ones are highlighted — mark them resolved once you've followed up.</p></div>
    <div class="card">
      <div class="card-h"><h2>To follow up${open.length?` <span style="color:var(--signal)">(${open.length})</span>`:''}</h2><button class="btn sm" id="m-refresh">Refresh</button></div>
      <div id="m-open">${open.length?render(open):`<div class="empty">${I.inbox}<div>No messages waiting. When a caller leaves one, it shows up here.</div></div>`}</div>
    </div>
    ${done.length?`<div class="card"><div class="card-h"><h2>Resolved</h2><span class="hint">${done.length}</span></div><div id="m-done">${render(done)}</div></div>`:''}
  </div>`;
  $("#m-refresh").onclick=async()=>{ const b=$("#m-refresh"); b.disabled=true; b.textContent="…"; await loadMessages(); pageMessages(); };
  bindMsgActions();
}
function langBadge(lang){ return (lang && String(lang).toLowerCase()!=='english') ? `<span class="lang-badge">${esc(lang)}</span>` : ''; }
function msgHTML(m){
  const p=parseMsg(m.body), isNew=m.status==='new', resolved=m.status==='resolved';
  const tel=p.number?p.number.replace(/[^\d+]/g,''):"";
  return `<div class="m-item ${isNew?'new':''} ${resolved?'done':''}">
    <div class="m-top"><span class="m-who">${esc(p.name||"Caller")}${isNew?'<span class="m-new">New</span>':''}${langBadge(m.language)}</span><span class="m-when">${fmtWhen(m.at)}</span></div>
    ${p.number?`<a class="m-num" href="tel:${esc(tel)}">${esc(p.number)}</a>`:''}
    <div class="m-text">${esc(p.text)}</div>
    <div class="m-actions">${resolved?`<button class="btn sm" data-act="reopen" data-id="${m.id}">Reopen</button>`:`<button class="btn sm primary" data-act="resolve" data-id="${m.id}">Mark resolved</button>`}</div>
  </div>`;
}
function bindMsgActions(){
  document.querySelectorAll('#page [data-act]').forEach(b=>b.onclick=async()=>{
    const id=b.dataset.id, status=b.dataset.act==='resolve'?'resolved':'new';
    b.disabled=true;
    const { error } = await db.from('messages').update({ status }).eq('id', id);
    if(!error){ const m=state.messages.find(x=>x.id===id); if(m) m.status=status; pageMessages(); updateNavBadge(); }
    else { b.disabled=false; }
  });
}
function updateNavBadge(){
  const item=document.querySelector('.nav-item[data-v="messages"]'); if(!item) return;
  let tag=item.querySelector('.tag.unread'); const n=unreadCount();
  if(n){ if(!tag){ tag=document.createElement('span'); tag.className='tag unread'; item.appendChild(tag);} tag.textContent=n; }
  else if(tag){ tag.remove(); }
}

async function renderThread(){

function bindThreadActions(c){
  const msg=$("#th-msg");
  const send=async(mid)=>{
    const ta=$("#th-draft"); const bodyText=ta?ta.value.trim():"";
    if(!bodyText){ if(msg){msg.style.color='var(--danger)';msg.textContent='Nothing to send.';} return; }
    const btns=document.querySelectorAll('.th-actions .btn'); btns.forEach(b=>b.disabled=true);
    if(msg){ msg.style.color='var(--muted)'; msg.textContent='Sending\u2026'; }
    try{
      const payload = mid ? { message_id:mid, body:bodyText } : { conversation_id:c.id, body:bodyText };
      const { data, error }=await db.functions.invoke("email-send",{ body:payload });
      if(error || !data || !data.ok){ throw new Error((data&&data.error)||(error&&error.message)||'send failed'); }
      await loadConversations(); state.openConvId=c.id; renderThread();
    }catch(e){ btns.forEach(b=>b.disabled=false); if(msg){msg.style.color='var(--danger)';msg.textContent='Could not send. '+(e.message||'');} }
  };
  const sBtn=document.querySelector('[data-act="send"]'); if(sBtn) sBtn.onclick=()=>send(sBtn.dataset.mid);
  const nBtn=document.querySelector('[data-act="sendnew"]'); if(nBtn) nBtn.onclick=()=>send(null);
  const dBtn=document.querySelector('[data-act="discard"]');
  if(dBtn) dBtn.onclick=async()=>{
    const draft=[...state.threadMsgs].reverse().find(m=>m.direction==='outbound'&&m.status==='queued');
    if(!draft) return;
    dBtn.disabled=true;
    await db.from('conversation_messages').update({status:'failed'}).eq('id',draft.id);
    await db.from('conversations').update({status:'active'}).eq('id',c.id);
    await loadConversations(); state.openConvId=c.id; renderThread();
  };
}

    if(act==='edit'){ const p=$("#c-edit-"+id); if(p) p.classList.toggle('open'); return; }
    if(act==='canceledit'){ const p=$("#c-edit-"+id); if(p) p.classList.remove('open'); return; }
    if(act==='saveedit'){
      const wrap=$("#c-edit-"+id); const g=f=>{ const el=wrap.querySelector('[data-f="'+f+'"]'); return el?el.value.trim():""; };
      const patch={ name:g('name')||null, company:g('company')||null, interest:g('interest')||null, language:g('language')||null, phone:g('phone')||c.phone, notes:g('notes')||null, memory:g('memory')||null, updated_at:new Date().toISOString() };

      else { b.disabled=false; b.textContent="Save"; alert("Could not save: "+error.message); }
      return;
    }
    if(act==='vip'||act==='block'){
      const target = act==='vip' ? (c.listType==='whitelist'?'normal':'whitelist') : (c.listType==='blacklist'?'normal':'blacklist');
      b.disabled=true;
      const { error } = await db.from('contacts').update({ list_type:target, updated_at:new Date().toISOString() }).eq('id', id);
      if(!error){ c.listType=target; pageContacts(); } else { b.disabled=false; alert("Could not update: "+error.message); }
      return;

      return;
    }
  });
}

async function saveAlertEmail(){
  const inp=$("#alert-email"); if(!inp) return;
  const msg=$("#alert-msg"), btn=$("#alert-save");
  const email=inp.value.trim();
  const escInp=$("#esc-email"); const escEmail=escInp?escInp.value.trim():"";
  const autoEl=$("#auto-send"); const autoSend=autoEl?!!autoEl.checked:undefined;
  const emailRe=/^[^@\s]+@[^@\s]+\.[^@\s]+$/;
  if(escInp && escEmail && !emailRe.test(escEmail)){ if(msg){msg.style.color='var(--danger)';msg.textContent='The escalation inbox is not a valid email address.';} return; }
  if(escInp && escEmail && email && escEmail.toLowerCase()===email.toLowerCase()){ if(msg){msg.style.color='var(--danger)';msg.textContent='The escalation inbox must be different from the general inbox, since '+aName()+' answers the general inbox.';} return; }

function readDirDom(){

    phone:r.querySelector('.dir-phone').value.trim(),
    email:r.querySelector('.dir-email').value.trim(),
    general:(i===pickedIdx),

}
function renderDirRows(){
  const box=$("#dir-rows"); if(!box) return;
  const rows=state._dir||[];
  const cols='grid-template-columns:1.3fr 1.1fr 1.4fr 30px';
  const head=`<div style="display:grid;${cols};gap:8px;font-size:11px;color:var(--muted-2);margin-bottom:6px"><span>Name</span><span>Phone</span><span>Email</span><span></span></div>`;
  const bodyRows = rows.length ? rows.map((p,i)=>`<div class="dir-row" data-i="${i}" style="display:grid;${cols};gap:8px;align-items:center;margin-bottom:8px">
    <input class="inp dir-name" placeholder="Name" value="${esc(p.name||'')}">
    <input class="inp dir-phone" placeholder="+18175551234" value="${esc(p.phone||'')}">
    <input class="inp dir-email" placeholder="name@company.com" value="${esc(p.email||'')}">

  </div>`).join("") : `<p style="font-size:12.5px;color:var(--muted-2);margin:0 0 6px">No one added yet. Click Add person to build your directory.</p>`;

  let generalIdx = rows.findIndex(p=>p.general);
  if(generalIdx<0 && rows.length) generalIdx=0;
  const selectHtml = rows.length ? `
    <div style="margin-bottom:14px">
      <label class="lab" style="display:block;margin-bottom:6px">When a caller doesn't ask for anyone by name, send the call to</label>

async function saveDirectory(){
  readDirDom();
  const msg=$("#dir-msg"), btn=$("#dir-save");
  if(!state.assistantId){ if(msg){msg.style.color='var(--danger)';msg.textContent='Set up your assistant first.';} return; }
  msg.style.color='var(--muted)'; msg.textContent='';
  const clean=[];
  for(const p of (state._dir||[])){
    if(!p.name && !p.phone && !p.email) continue;
    if(!p.name){ msg.style.color='var(--danger)'; msg.textContent='Every person needs a name.'; return; }
    const phone=(p.phone||'').replace(/[\s()\-.]/g,'');

    if(p.email && !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(p.email)){ msg.style.color='var(--danger)'; msg.textContent=`Check ${p.name}'s email address.`; return; }
    clean.push({name:p.name.trim(), phone, email:(p.email||'').trim(), general:!!p.general, order:p.order||(clean.length+1)});
  }

  const enOn=document.getElementById('dir-xfer-on');

  const { error } = await db.from('assistants').update({routing}).eq('id',state.assistantId);
  if(!error){ state.assistant.routing=routing; state._dir=clean.map(x=>Object.assign({},x)); renderDirRows(); msg.style.color='var(--muted)'; msg.textContent=clean.length+' saved.'; }
  else { msg.style.color='var(--danger)'; msg.textContent='Could not save. Try again.'; }

}

/* ---- document upload (browser-side text extraction) ---- */
const KB_EXT_OK=['pdf','doc','docx','xls','xlsx','csv','txt'];
const KB_EXT_IMG=['jpg','jpeg','png','gif','heic','heif','webp','tif','tiff','bmp'];
async function extractText(file){
  const ext=(file.name.split('.').pop()||'').toLowerCase();
  if(ext==='txt'||ext==='csv') return await file.text();
  if(ext==='docx'){
    if(!window.mammoth) throw new Error("Reader still loading — try again in a moment.");
    const r=await window.mammoth.extractRawText({arrayBuffer:await file.arrayBuffer()});
    return r.value||"";
  }
  if(ext==='doc') throw new Error("Old .doc format isn't supported. Open it and Save As .docx, then upload.");
  if(ext==='xlsx'||ext==='xls'){
    if(!window.XLSX) throw new Error("Reader still loading — try again in a moment.");
    const wb=window.XLSX.read(await file.arrayBuffer(),{type:'array'});
    return wb.SheetNames.map(n=>{
      const csv=window.XLSX.utils.sheet_to_csv(wb.Sheets[n]);
      return (wb.SheetNames.length>1?("# "+n+"\n"):"")+csv;
    }).join("\n\n");
  }
  if(ext==='pdf'){
    if(!window.pdfjsLib) throw new Error("PDF reader still loading — try again in a moment.");
    const pdf=await window.pdfjsLib.getDocument({data:await file.arrayBuffer()}).promise;
    const out=[];
    for(let i=1;i<=pdf.numPages;i++){
      const tc=await (await pdf.getPage(i)).getTextContent();
      out.push(tc.items.map(it=>it.str).join(" "));
    }
    return out.join("\n\n");
  }
  throw new Error("Unsupported file type.");
}
async function handleFileUpload(e){
  const file=e.target.files&&e.target.files[0]; const msg=$("#kb-up-msg");
  e.target.value="";
  if(!file||!msg) return;
  const ext=(file.name.split('.').pop()||'').toLowerCase();
  if(KB_EXT_IMG.includes(ext)){ msg.style.color="var(--danger)"; msg.textContent="Images and scans need OCR, which isn't supported yet. Type the details into Add knowledge for now."; return; }
  if(!KB_EXT_OK.includes(ext)){ msg.style.color="var(--danger)"; msg.textContent="That file type isn't supported."; return; }
  msg.style.color="var(--muted)"; msg.textContent="Reading "+file.name+"…";
  let text="";
  try{ text=((await extractText(file))||"").trim(); }
  catch(err){ msg.style.color="var(--danger)"; msg.textContent=err.message||"Couldn't read that file."; return; }
  if(text.length<20){
    msg.style.color="var(--danger)";
    msg.textContent = ext==='pdf'
      ? "This PDF looks like a scan (no readable text). OCR is coming soon — for now type the key details into Add knowledge."
      : "Couldn't find any text in that file.";
    return;
  }
  msg.textContent="Teaching "+aName()+" from "+file.name+"…";
  try{
    const { data, error }=await db.functions.invoke("knowledge-ingest-document",{ body:{ filename:file.name, text } });
    if(error || !data || !data.ok){ msg.style.color="var(--danger)"; msg.textContent=(data&&(data.message||data.error))||(error&&error.message)||"Couldn't save that document."; return; }
    msg.style.color="var(--ok)"; msg.textContent="Added "+file.name+" — "+data.chunks+" passage"+(data.chunks===1?"":"s")+" to review below.";
    await loadDocuments(); paintDocs();
  }catch(err){ msg.style.color="var(--danger)"; msg.textContent="Couldn't save that document."; }
}

/* ---- voice interview ---- */
const IV_LANGS=[
  ["en-US","English"],["es-US","Spanish / Español"],["fr-FR","French / Français"],
  ["de-DE","German / Deutsch"],["it-IT","Italian / Italiano"],["pt-BR","Portuguese / Português"],
  ["zh-CN","Chinese / 中文"],["ja-JP","Japanese / 日本語"],["ko-KR","Korean / 한국어"],
  ["vi-VN","Vietnamese / Tiếng Việt"],["hi-IN","Hindi / हिन्दी"],["ru-RU","Russian / Русский"],
  ["nl-NL","Dutch / Nederlands"],["th-TH","Thai / ไทย"],["ar-SA","Arabic / العربية"]
];
function ivSpeechSupported(){ return !!(window.SpeechRecognition||window.webkitSpeechRecognition); }
function ivInitCard(){
  const sel=$("#iv-lang"); if(!sel) return;
  sel.innerHTML=IV_LANGS.map(([c,l])=>`<option value="${c}">${esc(l)}</option>`).join("");
  try{ if(window.speechSynthesis){ speechSynthesis.getVoices(); speechSynthesis.onvoiceschanged=()=>{}; } }catch(e){}
  const note=$("#iv-note");
  if(!ivSpeechSupported()){ if(note){ note.style.color="var(--danger)"; note.textContent="Voice needs Chrome on a computer. You can use website import, documents, or type knowledge instead."; } $("#iv-start").disabled=true; }
  $("#iv-start").onclick=ivStart;
  $("#iv-finish").onclick=()=>ivFinish(false);
  $("#iv-cancel").onclick=()=>ivFinish(true);
}
function ivPickVoice(langTag){
  if(!window.speechSynthesis) return null;
  const vs=speechSynthesis.getVoices()||[]; const base=langTag.split("-")[0].toLowerCase();
  const inLang=vs.filter(v=>v.lang&&v.lang.toLowerCase().startsWith(base));
  const fem=/(female|samantha|victoria|karen|moira|tessa|fiona|google us english|google uk english female|zira|susan|linda|allison|ava|joanna|amelie|am[ée]lie|anna|paulina|m[óo]nica|ting-ting|kyoko|yuna|milena|google español|sara|nicky|carmit)/i;
  return inLang.find(v=>fem.test(v.name))||inLang.find(v=>/female/i.test(v.name))||inLang[0]||vs.find(v=>fem.test(v.name))||vs[0]||null;
}
function ivSpeak(text){
  return new Promise(res=>{
    if(!window.speechSynthesis){ res(); return; }
    try{ speechSynthesis.cancel(); }catch(e){}
    const u=new SpeechSynthesisUtterance(text);
    const v=ivPickVoice(state.iv.langTag); if(v){ u.voice=v; u.lang=v.lang; } else { u.lang=state.iv.langTag; }
    u.rate=1; let done=false; const fin=()=>{ if(!done){ done=true; res(); } };
    u.onend=fin; u.onerror=fin;
    speechSynthesis.speak(u);
    setTimeout(fin, Math.min(16000, 2500+text.length*75));
  });
}
function ivListen(){
  return new Promise(res=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){ res(""); return; }
    const rec=new SR(); state.iv.rec=rec;
    rec.lang=state.iv.langTag; rec.interimResults=false; rec.maxAlternatives=1; rec.continuous=false;
    let got=""; let done=false;
    const finish=(t)=>{ if(done) return; done=true; try{rec.stop();}catch(e){} res(t); };
    rec.onresult=(e)=>{ try{ got=e.results[0][0].transcript||""; }catch(_){ got=""; } };
    rec.onerror=()=>finish("");
    rec.onend=()=>finish(got);
    try{ rec.start(); }catch(e){ res(""); }
  });
}
function ivAddLine(role,text){
  state.iv.transcript.push({role,text});
  const el=$("#iv-transcript"); if(!el) return;
  const who=role==="assistant"?esc(aName()):"You";
  const color=role==="assistant"?"var(--ink)":"var(--virtual)";
  el.insertAdjacentHTML("beforeend",`<div style="margin-bottom:8px"><span style="font-weight:600;color:${color}">${who}:</span> ${esc(text)}</div>`);
  el.scrollTop=el.scrollHeight;
}
function ivSetStatus(t){ const s=$("#iv-status"); if(s) s.textContent=t; }
async function ivStart(){
  if(!ivSpeechSupported()) return;
  const sel=$("#iv-lang"); const langTag=sel.value; const langName=(IV_LANGS.find(x=>x[0]===langTag)||["","English"])[1].split(" / ")[0];
  state.iv={ langTag, langName, summary:"", turn:0, transcript:[], running:true, rec:null, maxTurns:16 };
  $("#iv-setup").style.display="none"; $("#iv-panel").style.display="";
  $("#iv-transcript").innerHTML=""; ivSetStatus("Connecting…");
  try{
    const first=await ivTurn(true);
    if(!first){ ivReset(); return; }
    await ivConverse();
  }catch(e){ ivSetStatus("Something went wrong. Press Finish to save what you have."); }
}
async function ivTurn(){
  const recent=state.iv.transcript.slice(-6);
  const { data, error }=await db.functions.invoke("interview-turn",{ body:{
    languageName:state.iv.langName, summary:state.iv.summary, recent, turn:state.iv.turn, maxTurns:state.iv.maxTurns, business:aName()
  }});
  if(error || !data || !data.ok){ ivSetStatus((data&&(data.message||data.error))||(error&&error.message)||"Model error."); return null; }
  state.iv.summary=data.summary||state.iv.summary;
  ivAddLine("assistant",data.say);
  ivSetStatus("Speaking…"); await ivSpeak(data.say);
  return data;
}
async function ivConverse(){
  let done=false;
  while(state.iv.running && !done && state.iv.turn < state.iv.maxTurns+4){
    ivSetStatus("Listening… speak your answer.");
    let answer=await ivListen();
    if(!state.iv.running) break;
    if(!answer){ ivSetStatus("Didn't catch that — listening again…"); answer=await ivListen(); }
    if(!state.iv.running) break;
    if(!answer){ ivSetStatus("Still nothing. Keep talking when ready, or press Finish to save."); continue; }
    ivAddLine("user",answer);
    state.iv.turn++;
    ivSetStatus("Thinking…");
    const res=await ivTurn(false);
    if(!res) break;
    done=res.done;
  }
  if(done && state.iv.running){ await ivFinish(false); }
}
let ivFinishing=false;
async function ivFinish(cancel){
  if(ivFinishing) return; ivFinishing=true;
  if(state.iv) state.iv.running=false;
  try{ if(state.iv&&state.iv.rec) state.iv.rec.stop(); }catch(e){}
  try{ if(window.speechSynthesis) speechSynthesis.cancel(); }catch(e){}
  if(cancel){ ivReset(); ivFinishing=false; return; }
  const tr=(state.iv&&state.iv.transcript)||[];
  if(tr.filter(m=>m.role==="user").length===0){ ivSetStatus("Nothing to save yet."); ivReset(); ivFinishing=false; return; }
  ivSetStatus("Saving what you taught me…");
  try{
    const { data, error }=await db.functions.invoke("interview-extract",{ body:{ languageName:(state.iv&&state.iv.langName)||"English", transcript:tr }});
    if(error || !data || !data.ok){ ivSetStatus((data&&(data.message||data.error))||(error&&error.message)||"Couldn't save the interview."); ivFinishing=false; return; }
    ivSetStatus("Saved "+data.count+" item"+(data.count===1?"":"s")+". "+aName()+" won't use these on calls until you review and approve them in the Documents section below.");
    await loadDocuments(); paintDocs();
    setTimeout(ivReset, 7000);
  }catch(e){ ivSetStatus("Couldn't save the interview."); }
  ivFinishing=false;
}
function ivReset(){
  const p=$("#iv-panel"), s=$("#iv-setup"); if(p) p.style.display="none"; if(s) s.style.display="";
}
async function deleteDocument(id){
  const d=(state.documents||[]).find(x=>x.id===id);
  if(!confirm("Delete "+(d?d.filename:"this document")+"? "+aName()+" will forget everything from it.")) return;
  const { error }=await db.from('documents').delete().eq('id',id);
  if(!error){ state.documents=(state.documents||[]).filter(x=>x.id!==id); paintDocs(); }
}

    authUrl:"https://login.microsoftonline.com/common/oauth2/v2.0/authorize",
    scope:"offline_access https://graph.microsoft.com/Calendars.ReadWrite https://graph.microsoft.com/User.Read",
    callback: SUPABASE_URL + "/functions/v1/microsoft-oauth-callback",
    extra:{ response_mode:"query", prompt:"consent" } }
};
async function calStatus(){ try{ const {data}=await db.rpc("donna_calendar_status"); return (data&&data[0])||null; }catch(e){ return null; } }
async function calConfig(){ try{ const {data}=await db.rpc("donna_calendar_oauth_config"); return data||{}; }catch(e){ return {}; } }
async function connectCalendar(provider){
  const cfg=await calConfig(); const pc=cfg[provider]||{};
  if(!pc.configured||!pc.client_id){ alert(CAL_PROVIDERS[provider].label+" isn't set up yet."); return; }
  const { data: accountId, error }=await db.rpc("donna_my_account_id");
  if(error||!accountId){ alert("Could not start the connection. Please reload and try again."); return; }
  const p=CAL_PROVIDERS[provider];
  const params=new URLSearchParams(Object.assign({ client_id:pc.client_id, redirect_uri:p.callback, response_type:"code", scope:p.scope, state:accountId }, p.extra));
  window.location.href=p.authUrl+"?"+params.toString();
}
async function disconnectCalendar(btn){
  btn.disabled=true; const o=btn.textContent; btn.textContent="Disconnecting…";
  const { error }=await db.rpc("donna_calendar_disconnect");
  if(error){ btn.disabled=false; btn.textContent=o; return; }
  paintCalendarCard();
}
function calToast(){
  const q=new URLSearchParams(location.search); const c=q.get("calendar");
  if(!c) return "";
  q.delete("calendar"); const qs=q.toString();
  history.replaceState({}, "", location.pathname + (qs?"?"+qs:""));
  if(c==="connected") return `<div style="margin-bottom:12px;font-size:13px;color:var(--ok)">Calendar connected.</div>`;
  if(c==="error") return `<div style="margin-bottom:12px;font-size:13px;color:var(--danger)">Could not connect that calendar. Please try again.</div>`;
  return "";
}
async function loadCalendarOptions(st){
  const sel=$("#cal-select"); const msg=$("#cal-select-msg"); if(!sel) return;
  try{
    const { data, error } = await db.functions.invoke("donna-calendars", { body:{ action:"list" } });
    if(error || !data || !data.ok || !Array.isArray(data.calendars) || !data.calendars.length){
      sel.innerHTML=`<option value="${esc(st.calendar_id||"")}">${esc(st.calendar_id||"primary")}</option>`;
      sel.disabled=true;
      if(msg) msg.textContent="Could not load your calendar list right now. "+aName()+" is using your current calendar.";
      return;
    }
    const acct=(data.account_email||"").toLowerCase();
    const cur = data.current || "";
    const hasCur = data.calendars.some(c=>c.id===cur);
    const optLabel=(c)=>{ let l=c.name||"Calendar"; if(c.primary) l+=" (default)"; if(c.owner && c.owner.toLowerCase()!==acct) l+=" — "+c.owner; return l; };
    sel.innerHTML = data.calendars.map(c=>`<option value="${esc(c.id)}" ${((cur&&c.id===cur)||(!cur&&c.primary))?"selected":""}>${esc(optLabel(c))}</option>`).join("");
    if(cur && !hasCur){ const o=document.createElement("option"); o.value=cur; o.textContent="Current selection"; o.selected=true; sel.insertBefore(o, sel.firstChild); }
    sel.disabled=false;
    if(msg){ msg.style.color="var(--muted)"; msg.textContent = data.account_email ? ((data.provider==="microsoft"?"Outlook":"Google")+" account: "+data.account_email) : ("Choose which calendar "+aName()+" reads and books on."); }
    sel.onchange=async()=>{
      const id=sel.value; if(!id) return;
      sel.disabled=true; if(msg){ msg.style.color="var(--muted)"; msg.textContent="Saving…"; }
      const { data:r, error:e2 } = await db.functions.invoke("donna-calendars", { body:{ action:"select", calendar_id:id } });
      sel.disabled=false;
      if(e2 || !r || !r.ok){ if(msg){ msg.style.color="var(--danger)"; msg.textContent="Could not save that calendar. Try again."; } return; }
      const name=(sel.options[sel.selectedIndex]||{}).textContent||"that calendar";
      if(msg){ msg.style.color="var(--ok)"; msg.textContent=aName()+" now reads and books on "+name+"."; }
    };
  }catch(_e){ if(msg) msg.textContent="Could not load your calendar list right now."; }
}
async function doSwitch(connectionId, calendar_id, ctl){
  const msg=$("#cal-move-msg");
  if(ctl) ctl.disabled=true;
  if(msg){ msg.style.color="var(--muted)"; msg.textContent="Switching and moving upcoming appointments…"; }
  const body={action:"switch", connection_id:connectionId}; if(calendar_id) body.calendar_id=calendar_id;
  const { data, error } = await db.functions.invoke("donna-calendars", { body });
  if(error || !data || !data.ok){ if(msg){ msg.style.color="var(--danger)"; msg.textContent="Could not switch. Please try again."; } if(ctl) ctl.disabled=false; return; }
  const s=data.summary||{moved:0,conflicts:[],failures:[],stranded:[]};
  let txt=`Switched. Moved ${s.moved||0} upcoming appointment${s.moved===1?"":"s"}.`;
  const conf=s.conflicts||[];
  if(conf.length){ txt+=` ${conf.length} overlap${conf.length===1?"s":""} something already on the new calendar and ${conf.length===1?"was":"were"} still moved for you to review: `+conf.map(c=>c.title+" ("+c.when+")").join("; ")+"."; }
  const fail=s.failures||[];
  if(fail.length){ txt+=` ${fail.length} could not be moved and stayed on the old calendar.`; }
  const strand=s.stranded||[];
  if(strand.length){ txt+=` ${strand.length} old cop${strand.length===1?"y":"ies"} could not be removed from the previous calendar, please delete ${strand.length===1?"it":"them"} there manually.`; }
  if(msg){ msg.style.color=(conf.length||strand.length||fail.length)?"var(--danger)":"var(--ok)"; msg.textContent=txt; }
  setTimeout(()=>paintCalendarCard(), 1600);
}
async function doRemove(connectionId, isActive, lbl){
  if(!confirm("Remove "+lbl+" from "+aName()+"?"+(isActive?" It is the active calendar, so Donna will have no calendar until you make another one active.":"")+" The login is deleted here; events already on that calendar stay where they are.")) return;
  const { data, error } = await db.functions.invoke("donna-calendars", { body:{ action:"remove", connection_id:connectionId } });
  if(error || !data || !data.ok){ alert("Could not remove that account. Please try again."); return; }
  paintCalendarCard();
}
async function paintCalendarCard(){
  const el=$("#cal-card-body"); if(!el) return;
  const toast=calToast();
  el.innerHTML=toast+`<p style="font-size:13px;color:var(--muted)">Checking connection…</p>`;
  const cfg=await calConfig();
  let data=null;
  try{ const r=await db.functions.invoke("donna-calendars",{body:{action:"accounts"}}); data=r.data; }catch(_e){}
  const accounts=(data&&data.ok&&Array.isArray(data.accounts))?data.accounts:[];
  if(accounts.length){
    const provLabel=p=>p==="microsoft"?"Microsoft Outlook":"Google Calendar";
    const activeId=data.active_id;
    const calendars=Array.isArray(data.calendars)?data.calendars:[];
    const current=data.current||"";
    const rows=accounts.map(a=>{
      const email=a.email?`<div style="font-size:11.5px;color:var(--muted)">${esc(a.email)}</div>`:"";
      const btn=a.active
        ? `<span style="font-size:11px;font-weight:600;color:var(--ok);border:1px solid var(--ok);border-radius:999px;padding:2px 10px">Active</span>`
        : `<button class="btn sm cal-switch" data-id="${esc(a.id)}">Make active</button>`;
      const rm=`<button class="cal-remove" data-id="${esc(a.id)}" data-active="${a.active?1:0}" data-lbl="${esc(provLabel(a.provider))}" title="Remove this account" style="border:none;background:none;color:var(--muted);cursor:pointer;font-size:18px;line-height:1;padding:4px">×</button>`;
      return `<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line,#eee)"><div><div style="font-weight:600">${esc(provLabel(a.provider))}</div>${email}</div><div style="display:flex;align-items:center;gap:8px">${btn}${rm}</div></div>`;
    }).join("");
    const calPicker=calendars.length>1?`<div style="margin-top:12px"><div style="font-size:12px;color:var(--muted);margin-bottom:4px">Calendar on the active account</div><select id="cal-within" style="font:inherit;color:inherit;background:transparent;border:1px solid var(--line,#d8dee9);border-radius:8px;padding:6px 10px;max-width:260px">${calendars.map(c=>`<option value="${esc(c.id)}" ${c.id===current?"selected":""}>${esc(c.name)}${c.primary?" (default)":""}</option>`).join("")}</select></div>`:"";
    const connectBtns=["google","microsoft"].map(pv=>{ const c=cfg[pv]||{}; return c.configured?`<button class="btn sm cal-connect" data-pv="${pv}">Connect a ${pv==="microsoft"?"Microsoft":"Google"} account</button>`:""; }).filter(Boolean).join(" ");
    el.innerHTML=toast+`
      <div>${rows}</div>
      ${calPicker}
      <div id="cal-move-msg" style="font-size:12.5px;color:var(--muted);margin-top:12px"></div>
      <p style="font-size:12.5px;color:var(--muted);margin-top:12px">${esc(aName())} reads busy times from and books onto the active calendar only. Switching moves your upcoming appointments to it and flags anything that overlaps.</p>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px">${connectBtns}<button class="btn sm" id="cal-off">Turn off calendar sync</button></div>
      <p style="font-size:11.5px;color:var(--muted-2);margin-top:8px">Turning off sync stops reading and writing your outside calendar. ${esc(aName())} still books and saves every appointment here in the dashboard.</p>`;
    el.querySelectorAll(".cal-switch").forEach(b=>b.onclick=()=>doSwitch(b.dataset.id, null, b));
    el.querySelectorAll(".cal-remove").forEach(b=>b.onclick=()=>doRemove(b.dataset.id, b.dataset.active==="1", b.dataset.lbl));
    const within=$("#cal-within"); if(within) within.onchange=()=>doSwitch(activeId, within.value, within);
    el.querySelectorAll(".cal-connect").forEach(b=>b.onclick=()=>connectCalendar(b.dataset.pv));
    const off=$("#cal-off"); if(off) off.onclick=(e)=>disconnectCalendar(e.currentTarget);
  } else {
    const opts=["google","microsoft"].map(pv=>{
      const c=cfg[pv]||{}; const lab=CAL_PROVIDERS[pv].label;
      return c.configured
        ? `<button class="btn primary cal-connect" data-pv="${pv}">Connect ${esc(lab)}</button>`
        : `<button class="btn" disabled title="Not set up yet">${esc(lab)} — setup required</button>`;
    }).join(" ");
    el.innerHTML=toast+`
      <p style="font-size:13px;color:var(--muted);margin-bottom:14px">Connect a calendar so ${esc(aName())} only offers times you're free and adds appointments automatically. Choose Google or Microsoft.</p>
      <div style="display:flex;gap:10px;flex-wrap:wrap">${opts}</div>`;
    el.querySelectorAll(".cal-connect").forEach(b=>b.onclick=()=>connectCalendar(b.dataset.pv));
  }
}

/* ===================== CALLS PAGE (live) ===================== */
async function loadCalls(){
  const { data } = await db.from('calls').select('*').eq('account_id', state.account.id).order('started_at',{ascending:false}).limit(100);
  state.calls = data || [];
}
function fmtDur(s){ if(!s&&s!==0) return ''; const m=Math.floor(s/60), ss=s%60; return m?`${m}m ${ss}s`:`${ss}s`; }
function fmtDateTime(iso){ if(!iso) return ''; return new Intl.DateTimeFormat('en-US',{timeZone:state.account.timezone, weekday:'short', month:'short', day:'numeric', hour:'numeric', minute:'2-digit'}).format(new Date(iso)); }

function pageCalls(){
  $("#page").innerHTML=`
  <div class="page">
    <div class="page-head"><h1>Calls</h1><p>Every call ${esc(aName())} handles, with the full conversation. This page updates on its own — a call appears the moment it starts, and the transcript fills in when it wraps.</p></div>
    <div class="card">
      <div class="card-h"><h2>Recent calls</h2><span class="calls-live"><span class="d"></span>Live</span></div>
      <div id="calls-list"></div>
    </div>
    <div id="call-detail"></div>
  </div>`;
  paintCallsList();
  paintCallDetail();
  subscribeCalls();
}
function paintCallsList(){
  const el=$("#calls-list"); if(!el) return;
  el.innerHTML = state.calls.length
    ? state.calls.map(callRowHTML).join("")
    : `<div class="empty">${I.phone}<div>No calls yet. When someone calls ${esc(aName())}, it shows up here in real time.</div></div>`;
  el.querySelectorAll("[data-call]").forEach(b=>b.onclick=()=>openCall(b.dataset.call));
}
function callRowHTML(c){
  const live = c.status==='in_progress' || c.status==='ringing';
  const dur = (c.duration_seconds||c.duration_seconds===0)?fmtDur(c.duration_seconds):'';
  const who = c.from_number || 'Unknown caller';
  const open = state.openCallId===c.id;
  const out = c.outcome?`<span class="appt-status s-${c.outcome}" style="margin-left:8px">${esc(String(c.outcome).replace(/_/g,' '))}</span>`:'';
  const body = c.summary ? esc(c.summary)
    : (live ? `<span style="color:var(--signal)">On the line now…</span>`
            : `<span style="color:var(--muted-2)">No summary</span>`);
  return `<div class="call-item ${live?'live':''} ${open?'open':''}" data-call="${c.id}">
    <div class="m-top"><span class="m-who">${live?'<span class="livedot"></span>':''}${esc(who)}${out}${langBadge(c.language)}</span>
      <span class="m-when">${esc(fmtDateTime(c.started_at))}${dur?` · ${dur}`:''}</span></div>
    <div class="m-text">${body}</div>
  </div>`;
}
async function openCall(id){
  if(state.openCallId===id){ state.openCallId=null; if(state.txChannel){db.removeChannel(state.txChannel);state.txChannel=null;} paintCallsList(); paintCallDetail(); return; }
  state.openCallId=id;
  const { data } = await db.from('transcript_messages').select('*').eq('call_id',id).order('said_at',{ascending:true});
  state.callTranscript = data || [];
  paintCallsList();
  paintCallDetail();
  subscribeTranscript(id);
}
function paintCallDetail(){
  const el=$("#call-detail"); if(!el) return;
  if(!state.openCallId){ el.innerHTML=''; return; }
  const c = state.calls.find(x=>x.id===state.openCallId);
  const live = c && (c.status==='in_progress'||c.status==='ringing');
  const lines = (state.callTranscript||[]).map(t=>`<div class="tline ${esc(t.speaker)}"><span class="who">${t.speaker==='donna'?esc(aName()):(t.speaker==='caller'?'Caller':esc(t.speaker))}</span><span class="bub">${esc(t.text)}</span></div>`).join("");
  el.innerHTML=`<div class="card">
    <div class="card-h"><h2>Transcript</h2><button class="btn sm" id="call-close">Close</button></div>
    ${live?`<p style="font-size:12.5px;margin-bottom:12px"><span class="livedot"></span><span style="color:var(--signal)">Call in progress — the transcript appears once it ends.</span></p>`:''}
    <div class="transcript">${lines || `<div class="empty" style="padding:26px">${live?'Listening…':'No transcript was captured for this call.'}</div>`}</div>
    ${c&&c.recording_url?`<div style="margin-top:14px"><a class="btn sm" href="${esc(c.recording_url)}" target="_blank" rel="noopener">▶ Play recording</a></div>`:''}
  </div>`;
  const cl=$("#call-close"); if(cl) cl.onclick=()=>{ state.openCallId=null; if(state.txChannel){db.removeChannel(state.txChannel);state.txChannel=null;} paintCallsList(); paintCallDetail(); };
}
async function ensureRealtimeAuth(){
  try{ const { data:{ session } } = await db.auth.getSession(); if(session) db.realtime.setAuth(session.access_token); }catch(e){}
}
async function subscribeCalls(){
  if(state.callsChannel) return;
  await ensureRealtimeAuth();
  state.callsChannel = db.channel('rt-calls')
    .on('postgres_changes', { event:'*', schema:'public', table:'calls', filter:`account_id=eq.${state.account.id}` },
      async ()=>{ await loadCalls(); paintCallsList(); if(state.openCallId) paintCallDetail(); })
    .subscribe();
}
async function subscribeTranscript(callId){
  if(state.txChannel){ db.removeChannel(state.txChannel); state.txChannel=null; }
  await ensureRealtimeAuth();
  state.txChannel = db.channel('rt-tx-'+callId)
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'transcript_messages', filter:`call_id=eq.${callId}` },
      payload=>{ state.callTranscript.push(payload.new); paintCallDetail(); })
    .subscribe();
}
function teardownRealtime(){
  if(state.callsChannel){ db.removeChannel(state.callsChannel); state.callsChannel=null; }
  if(state.txChannel){ db.removeChannel(state.txChannel); state.txChannel=null; }
  state.openCallId=null; state.callTranscript=[];
}

/* ===================== BOOT ===================== */
async function boot(){
  if(pendingRecovery){ state.authMode="reset"; renderAuth(); return; }
  document.getElementById("root").innerHTML=`<div class="booting">Loading…</div>`;
  const { data:{ session } } = await db.auth.getSession();
  if(!session){ renderAuth(); return; }
  let ok = await loadData();
  if(!ok){ await new Promise(r=>setTimeout(r,1200)); ok = await loadData(); } // give the signup trigger a moment
  if(ok) renderApp(); else renderAuth();
}
db.auth.onAuthStateChange((event)=>{ if(event==='PASSWORD_RECOVERY'){ pendingRecovery=true; state.authMode='reset'; renderAuth(); } });
if('speechSynthesis' in window){ window.speechSynthesis.getVoices(); window.speechSynthesis.onvoiceschanged=()=>{}; }
boot();
</script>
